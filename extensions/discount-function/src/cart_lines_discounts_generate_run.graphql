# [START discount-function.graphql.cart]
query CartInput {
  cart {
    cost {
      subtotalAmount {
        amount
      }
    }
    lines {
      id
      quantity
      attribute(key: "_sb_bundle_id") {
        value
      }
      attributes {
        key
        value
      }
      cost {
        subtotalAmount {
          amount
        }
      }
      merchandise {
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
    }
  }
  discount {
    discountClasses
    metafield(namespace: "app", key: "bundle_definitions") {
      jsonValue
    }
  }
  enteredDiscountCodes {
    code
  }
  triggeringDiscountCode
  shop {
    activeBundlesConfig: metafield(namespace: "smart_bundle", key: "active_bundles") {
      jsonValue
    }
    metafield(namespace: "smart_bundle", key: "active_bundles") {
      jsonValue
    }
  }
}
# [END discount-function.graphql.cart]
