# [START discount-function.graphql.cart]
query CartInput {
  cart {
    lines {
      id
      quantity
      cost {
        subtotalAmount {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
    }
  }
  discount {
    discountClasses
  }
  shop {
    metafield(namespace: "smart_bundle", key: "active_bundles") {
      jsonValue
    }
  }
}
# [END discount-function.graphql.cart]
